name: Check documentation

on: workflow_dispatch

jobs:
  check:
    if: github.repository == 'software-mansion/react-native-executorch'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-check-${{ github.ref }}
      cancel-in-progress: true
    env:
      WORKING_DIRECTORY: docs
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: Use Node.js 18
        uses: actions/setup-node@v2
        with:
          node-version: 18
          cache: 'yarn'
      - name: Configure Yarn cache directory
        run: yarn config set cacheFolder .yarn/cache
      - name: Create cache directory
        working-directory: ${{ env.WORKING_DIRECTORY }}
        # the mkdir is a workaround to avoid this: https://github.com/actions/setup-node/issues/317
        run: mkdir -p .yarn/cache
      - name: Install Dependencies
        run: yarn install
      - name: Generate docs
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: yarn build
